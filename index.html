<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="w-[70%] mx-auto bg-yellow-300 space-y-6">
    <header>
        <h1 class="text-5xl font-bold text-blue-950 ">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-9 mt-5">
            <div class="bg-blue-400 p-4 rounded-2xl">
                <p>Total</p>
                <p id="total">0</p>
            </div>

            <div class="bg-green-200 p-4">
                <p >Interview</p>
                <p id="interviewCount">0</p>
            </div>

            <div class="bg-red-200 p-4">
                <p >Rejected</p>
                <p id="rejectedCount">0</p>
            </div>
        </div>
    </header>
    <hr>
<!--end  -->




    <script src="/script.js"></script>
</body>
</html>
